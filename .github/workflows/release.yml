name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # While changesets are pending, this opens or updates the "Version Packages"
      # PR. When that PR is merged (no changesets left), it publishes the changed
      # packages to npm with provenance, tags the release, and creates a GitHub
      # Release. Requires the NPM_TOKEN secret (an npm automation token).
      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Release: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
