name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          # OIDC trusted publishing needs Node 24 + npm >= 11.5.1; the OIDC
          # handshake silently fails on Node 22 even with npm upgraded.
          node-version: "24"
      - run: npm install -g npm@latest
      # Opens/updates the release PR while changesets pend; publishes to npm via
      # OIDC trusted publishing (no token) with provenance once it's merged.
      - id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Release the next package versions"
          commit: "version packages"
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
      - name: Add versions to the release PR title
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          versions=$(gh pr view "$PR" --json body --jq '.body' \
            | grep -oE '^## .+@[0-9]+\.[0-9]+\.[0-9]+' | sed 's/^## //' | paste -sd, - | sed 's/,/, /g')
          if [ -n "$versions" ]; then
            gh pr edit "$PR" --title "Release: $versions"
          fi
