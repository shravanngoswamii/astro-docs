name: Setup
description: Install pnpm and Node, then install the workspace dependencies.

inputs:
  node-version:
    description: Node.js version to use.
    default: "22"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
